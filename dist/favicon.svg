<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#8a6a4a"/>

  <!-- Wrench icon, centered, white -->
  <g transform="translate(256,256)">
    <!-- Wrench body -->
    <path d="
      M 60 -160
      C 100 -160 130 -130 130 -90
      C 130 -72 123 -56 112 -44
      L 20 48
      L 40 68
      L -68 176
      C -82 190 -104 190 -118 176
      C -132 162 -132 140 -118 126
      L -10 18
      L -30 -2
      L 62 -94
      C 50 -106 44 -122 44 -140
      C 44 -152 48 -162 55 -170
      Z
    " fill="none"/>

    <!-- Cleaner wrench SVG path -->
    <path d="
      M 80 -140
      A 70 70 0 0 1 10 -70
      L -110 50
      A 28 28 0 0 0 -110 90
      A 28 28 0 0 0 -70 90
      L 50 -30
      A 70 70 0 0 1 80 -140
      Z
    " fill="white" opacity="0.95"/>

    <!-- Wrench head circle -->
    <circle cx="70" cy="-110" r="42" fill="none" stroke="white" stroke-width="22" opacity="0.95"/>
    <circle cx="70" cy="-110" r="18" fill="#8a6a4a"/>
  </g>

  <!-- Small clipboard/list lines to hint at tracking -->
  <rect x="60" y="340" width="130" height="14" rx="7" fill="white" opacity="0.5"/>
  <rect x="60" y="368" width="90" height="14" rx="7" fill="white" opacity="0.35"/>
</svg>
